name: FILE_MAP check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  file-map-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/gen_file_map.py --check
